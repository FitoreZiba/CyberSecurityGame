apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: cybersecurity
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: f1tore/cybersecurity-frontend:latest
          ports:
            - containerPort: 80